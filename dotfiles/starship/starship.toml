# ~/.config/starship.toml

####################################### Prompt Style #########################################
format = '''
[┌──(slate400)$git_branch${custom.git_changes}$git_status$fill](slate400)$time[┐](slate400)
[│](slate400)$directory
[└──>](slate400)
'''

####################################### Prompt Configs ########################################
# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# Disable the blank line at the start of the prompt
add_newline = false

####################################### Custom Colours #######################################
# Set 'foo' as custom colour palette
palette = 'foo'

[palettes.foo]
# Overwrite existing colour
blue = '#2b7fff'
red = '#e7000b'
green = '#00c950'
yellow = '#fcc800'
# Define new colour
slate400 = '#90a1b9'

########################################## Elements ##########################################
[fill]
symbol = '─'
style = 'slate400'

[time]
disabled = false
format = '[\[$time\]]($style)[──](slate400)'
time_format = '%H:%M:%S'
style = 'bold slate400'

########################################## Git Tools #########################################
[git_branch]
# Fixed the broken bracket: Opening [Git: and closing with ]
format = '[$symbol$branch](slate400)'
symbol = '\[Git:'
disabled = false

[git_status]
format = '[$ahead_behind](slate400)'
disabled = false
up_to_date = ''

# This custom module counts EVERY local change and groups them into one single number
[custom.git_changes]
command = """
changes=$(git status --porcelain 2>/dev/null | wc -l | xargs)
if [ "$changes" -ne 0 ]; then
    echo "${changes}"
fi
"""
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "slate400"
format = "[ +$output\\]]($style)"

# Combine them cleanly using Starship's native git module
[git_state]
disabled = true