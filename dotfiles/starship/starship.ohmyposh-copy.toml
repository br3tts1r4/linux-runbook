"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[os]
disabled = false
style = "fg:244"

[os.symbols]
Arch = "arch "
Linux = "linux "

[directory]
style = "fg:39"
truncation_length = 3
truncate_to_repo = true
read_only = " ro"

[character]
success_symbol = "[>](fg:42)"
error_symbol = "[>](fg:196)"
vimcmd_symbol = "[<](fg:42)"

[git_branch]
symbol = "on "
style = "fg:208"
format = '[$symbol$branch]($style) '

[git_status]
style = "fg:203"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "~"
ahead = "^${count}"
behind = "v${count}"
diverged = "^${ahead_count}v${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "r${count}"
deleted = "x${count}"

[cmd_duration]
min_time = 500
style = "fg:241"
format = '[took $duration]($style) '

[python]
symbol = "py "
style = "fg:220"
format = '[$symbol($version )(\($virtualenv\) )]($style)'

[nodejs]
symbol = "node "
style = "fg:70"
format = '[$symbol($version )]($style)'

[rust]
symbol = "rs "
style = "fg:166"
format = '[$symbol($version )]($style)'

[golang]
symbol = "go "
style = "fg:74"
format = '[$symbol($version )]($style)'