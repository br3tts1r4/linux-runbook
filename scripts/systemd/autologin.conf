[Service]
# Clear the inherited ExecStart before setting our own
ExecStart=

# Launch kmscon on this TTY with autologin via agetty
ExecStart=-/usr/bin/kmscon \
	--vt=%I \
	--seats=seat0 \
	--no-switchvt \
	# Optional (already set in kmscon.conf) — uncomment and insert before `-- /sbin/agetty`:
	# 	--font-name "Fira Code" \
	# 	--font-size 12 \
	# 	--term xterm-256color \
	-- /sbin/agetty \
		--autologin userExample \
		--noclear %I $TERM
